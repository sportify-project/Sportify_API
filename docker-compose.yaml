services:

  # Database
  postgres:
    image: postgres:17.4
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: sportstore
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # Postgres Admin
  pgadmin:
    image: dpage/pgadmin4:9.2.0
    container_name: pgadmin
    ports:
      - "15051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: thinhanhdang014@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 123
    depends_on:
      - postgres

volumes:
  postgres-data:
